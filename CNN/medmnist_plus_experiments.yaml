seed: 42
device: auto
medmnist_download: true

image_size: 224
batch_size: 64
num_workers: 8
pin_memory: true
persistent_workers: true
prefetch_factor: 4

learning_rate: 0.0003
weight_decay: 0.0001
epochs: 20
threshold: 0.5
amp: true
cudnn_benchmark: true

early_stopping_patience: 5
save_dir: checkpoints

model:
  base_channels: 32

experiments:
  - model_name: octmnist_classifier
    dataset_flag: octmnist
    batch_size: 128
    epochs: 20

  - model_name: tissuemnist_classifier
    dataset_flag: tissuemnist
    batch_size: 64
    epochs: 20

  - model_name: pathmnist_classifier
    dataset_flag: chestmnist
    batch_size: 64
    epochs: 25
